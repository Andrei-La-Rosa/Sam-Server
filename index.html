:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}

*{
     margin: 0;
     padding: 0;
     box-sizing: border-box;
    font-family: 'Poppins';
    text-decoration: none;
    scroll-behavior: smooth;
    list-style: none;
}
        
header{
    position: fixed;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5rem;
    background-color: black(0, 0, 0, 0.8);
    backdrop-filter: blur(8px);
    color: var(--color-2);
    padding: 0.5rem 1.5rem;
    border-radius: 3rem;
    z-index: 1000;
}

.logo{
    color var(--color-2);
    font-size: 1.3rem;
    font-weight: 600;
    text-wrap: nowrap;
    transition: 0.3s ease-in-out;
}

.logo:hover{
    transform: scale(1.1);
}

.nav-links{
    display: flex;
    gap: 2rem;
}

link a{
    position: relative;
    color: va(--color-2);
    font-weight: 300;
}

link a::before{
    position: absolute;
    content: '';
    width: 0;
    left: 0;
    height: 5px;
    top: 25px;
    border-radius: 1rem;
    transition: 0.3s ease-in-out;
    background: linear-gradient(to right, var(--color-1 0, 157, 255), var(--secondary-color 255, 0, 255));
}

link a:hover::before{
    width: 100%;
    
}

html{
    font-family: Merriweather, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
    color: var(--text-color);
}

body{
    padding: 1em;
    background-color: var(--base-color);
}

h1, h2, h3, {
    font-family: Merriweather, 'Segoe UI', Tahoma;
}

nav{
    margin: 1em auto  3em auto;
    width: min(1000px, 100%);
}

nav ul {
    display: flex;
    align-items: center;
    list-style-type: none;
    gap: 2em;
}

nav li:first-child{
    margin-right: auto;
    font-family: Merriweather, sans-serif;
    font-weight: bold;
}

nav a {
    text-decoration: none;
    color: var(--secondary-color);
}

nav a:hover {
    text-decoration: underline;
}

header, section {
    margin: 2em auto;
    width min(75em, 100%);
    background-color: var(--base-color);
    padding: min(2em, 15%);
    border-radius: 1em; 
}

.profile__details{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 3em; 
}

header img {
    border-radius: 5px;
    max-width: 100%;
    object-fit: cover;
    object-position: bottom;
    box-shadow: 10px 10px 50px gray; 
}

.text_container{
    flex: 0 1 34em;
}

h1{
    text-align: center;
    color: var(--secondary-color);
    font-size: 2.5rem; 
}

.text-container p {
    margin: .75em 0 1em 0;
    font-size: 1.25rem;
}
        
.designation{
    font-size: 0.8rem;
    text-align: center;
    color: gray;
} 
        
.social__icons{
   padding: 2rem 0;
   display: flex;
   align-items: center;
   justify-content: center;
   gap: 2rem; 
}
        
.youtube{
    background-color: red;
}

.youtube:hover{
    box-shadow: 0px 2px 5px;
}

.tiktok{
    background-color: black;
}

.tiktok{
    box-shadow: 0px 2px 5px;
}
    </style>
</head>
