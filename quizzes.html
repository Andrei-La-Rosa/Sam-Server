<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Upload</title>
<style>
:root {
    --base-color: #ffffff;
    --text-color: black;
    --primary-color: #ffc06e;
    --secondary-color: #8D8DFF;
    --color-1: rgba(255, 255, 255, 0.952);
    --color-2: #cccccc;
    --color-3: #c9c5cc;
}
    
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
    
body {
  display: center
  padding: 1rem;
  font-family: Arial, sans-serif;
  background: var(--base-color);
}

h2{
    text-align: center;
    color: var(--secondary-color);
    font-size: 2.5rem; 
}
/* Container */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
  gap: 40px;
}

/* Card */
.card {
  background: var(--base-color);
  padding: 40px;
  width: 300px;
  text-align: center;
  border-radius: 15px;

  /* Glow effect */
  box-shadow: 0 0 20px var(--text-color);
}

.card h2 {
  margin-bottom: 10px;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input {
  padding: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: var(--secondary--color);
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: var(--secondary--color);
}
Sent
Write to Andrei Samuel La Rosa

</style>
</head>
<body>

<div class="container">

    <div class="card">
        <h2>Quiz Upload</h2>

        <input type="text" id="title" placeholder="Title"><br><br>

        <label>Upload File</label><br>
        <input type="file" id="file"><br><br>

        <label>Upload Image</label><br>
        <input type="file" id="image"><br><br>

        <button onclick="submitQuiz()">Submit</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
