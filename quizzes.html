<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Upload</title>
<style>
:root {
    --base-color: #ffffff;
    --text-color: black;
    --primary-color: #ffc06e;
    --secondary-color: #8D8DFF;
    --color-1: rgba(255, 255, 255, 0.952);
    --color-2: #cccccc;
    --color-3: #c9c5cc;
}
    
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
    
body {
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--secondary--color);
}

h2{
    text-align: center;
    color: var(--secondary-color);
}
    
/* Container */
.container {
    position: relative;
    maxwidth: 400px;
    padding: 2rem;
    text-align: center;
    border-radius: 5px;
    background-color var(--secondary-color);
    bax-shadow: 10px 10px 50px var(--text-color); 
}

/* Card */
.card {
  background: var(--base-color);
  padding: 40px;
  width: 300px;
  text-align: center;
  border-radius: 15px;

  /* Glow effect */
  box-shadow: 0 0 20px var(--text-color);
}

.card h2 {
  margin-bottom: 10px;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input {
  padding: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: var(--secondary-color);
  color: var(--base-color);
  padding: 10px;
  border: none
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: var(--secondary--color);
}
    
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Quiz Upload</h2>
        <form id="quiz-form">
        <label>Title:</label>
        <input type="text" id="title"><br><br>

        <label>Upload File:</label><br>
        <input type="file" id="file"><br><br>

        <label>Upload Image:</label><br>
        <input type="file" id="image"><br><br>

        <button onclick="submitQuiz()">Submit</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
