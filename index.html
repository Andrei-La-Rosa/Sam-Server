<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Me</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap');

:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}

*{
 margin: 0;
 padding: 0;
 box-sizing: border-box;
}

body{
    padding: 1em;
    background-color: var(--base-color);
}

/* PAGE LOAD ANIMATION */
body {
  opacity: 0;
  transform: translateY(20px);
  animation: pageEnter 0.6s ease forwards;
}

@keyframes pageEnter {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1, h2, h3, {
    font-family: Merriweather, 'Segoe UI', Tahoma;
}
html{    font-family: Merriweather, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;    color: var(--text-color);}

/* NAVBAR */

nav{    
    display: flex;    
    justify-content: space-between;    
    align-items: center;   
    flex-wrap: wrap;    
    padding: 10px 0;
}

nav a{
    text-decoration: none;
    color: var(--secondary-color);
    margin: 0 8px;
}

nav .right{
    display: flex;
    gap: 10px;
}

nav a:hover{
    text-decoration: underline;
} 

header, section {    
    margin: 2em auto;    
    width: min(75em, 100%);   
    padding: 1.5em;    
    border-radius: 1em; }

/* PROFILE */
.profile-details{    
    display: flex;    
    justify-content: center;
    align-items: center;    
    flex-wrap: wrap;    
    gap: 2em; }

.profile-details img {       
    max-width: 100%;    
    border-radius: 12px;   
    object-fit: cover; 
    object-position: bottom;  
    box-shadow: 10px 10px 40px gray; 
}
/* TEXT */
.text-container{    
    flex: 1;    
    min-width: 250px;
}

h1{
    text-align: center;
    color: var(--secondary-color);
    font-size: 2.2rem; 
}

.text-container p {
    margin: .5em 0;
    font-size: 1.1rem;
}

.designation{
    font-size: 0.8rem;
    text-align: center;
    color: gray;
} 

/* SOCIAL ICONS */
.social-icons{
   padding: 1rem 0;
   display: flex;
   justify-content: center;
   gap: 2rem; 
}

/* ICON STYLE */
.social-icons a i {
    font-size: 28px;
    transition: transform 0.3s ease, filter 0.3s ease;
}

/* GENERAL HOVER */
.social-icons a:hover i {
    transform: scale(1.3) rotate(8deg);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
}

/* YOUTUBE ANIMATION */
.ri-youtube-fill:hover {
    animation: pulseYT 0.6s ease;
}

@keyframes pulseYT {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1.2); }
}

/* TIKTOK ANIMATION */
.ri-tiktok-line:hover {
    animation: bounceTT 0.6s ease;
}

@keyframes bounceTT {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
} 

   header {
   margin-top: 0;
 } 

    nav .right a{        
    gap: 10px;  
    display: none;      
 }    

   nav .right a[href="activities.html"] {      
    display: inline-block;
 }   
     h1{        
     font-size: 1.6rem;    
 }     
    .text-container p{        
    font-size: 0.95rem;    
 }   
    .profile-details{        
    gap: 1.5em;    
 }    
    .profile-details img{        
     max-width: 100%;    
 }  
     .social-icons{       
      gap: 1.2rem;    
 }
}
</style>
</head>

<body>

<header>
    <nav>
        <div class="left">
            <a href="index.html">About Me</a>
        </div>

        <div class="right">
            <a href="activities.html">	Activities</a>
            <a href="quizzes.html">Quiz</a>
            <a href="activity.html">Activity</a>
            <a href="exam.html">Exams</a>
        </div>
    </nav>

    <div class="profile-details">
        <img src="dre.jpg" alt="My Picture">       
         
        <div class="text-container">
            <h1>Andrei Samuel C. La Rosa</h1>
            <p class="designation">Student no: 251100672</p>

            <p>
                <b>I'm a student of Computer Science [BSCS-1B] in CVSU-Silang</b><br>
                I enjoy making content such as <strong>Drawing, Editing, and Gaming</strong>
            </p>

            <div class="social-icons">
                <a href="https://www.youtube.com/channel/UCZ1qf-GyxfY_5ZR7TsMjRZA">
                    <i class="ri-youtube-fill"></i>
                </a>

                <a href="https://www.tiktok.com/@nyreitv?is_from_webapp=1&sender_device=pc">
                    <i class="ri-tiktok-line"></i>
                </a>
            </div>
        </div>
    </div>

</header>

</body>
</html>
