<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
<title>Quiz Upload</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: white;
}

/* Navbar */
.navbar {
  background: linear-gradient(to right, purple, violet);
  padding: 15px;
  text-align: center;
}

.navbar a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

/* Container */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
  gap: 40px;
}

/* Card */
.card {
  background: #2b2b3c;
  padding: 40px;
  width: 300px;
  text-align: center;
  border-radius: 15px;

  /* Glow effect */
  box-shadow: 0 0 20px purple;
}

.card h2 {
  margin-bottom: 10px;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input {
  padding: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: purple;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: violet;
}
Sent
Write to Andrei Samuel La Rosa

</style>
</head>
<body>
<header>
<div class="left">
            <a href="activities.html"><i class="ri-arrow-left-line"></i></a>
            </div>
<div class="container">
    <div class="card">
        <h2>Quiz Upload</h2>
        <form id="quiz-form">
        <label>Title:</label>
        <input type="text" id="title"><br>

        <label>Upload File:</label><br>
        <input type="file" id="file"><br><

        <label>Upload Image:</label><br>
        <input type="file" id="image"><br>

        <button onclick="submitQuiz()">Submit</button>
        </form>
    </div>
</div>
</header>
<script src="script.js"></script>
</body>
</html>
