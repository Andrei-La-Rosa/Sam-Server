:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}

*{
 margin: 0;
 padding: 0;
 box-sizing: border-box;
}

html{
    font-family: Merriweather, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
    color: var(--text-color);
}

body{
    padding: 1em;
    background-color: var(--base-color);
}

h1, h2, h3, {
    font-family: Merriweather, 'Segoe UI', Tahoma;
}

nav{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0;
    height: 80px;
}

nav .left a{
    color: var(--secondary-color);
    font-size: 22px;
    font-weight: 600;
}

@media (max-width: 600px){
    nav{
        padding 0 20px;
    }
}

nav .right a{
    color: var(--secondary-color); 
    font-family: Merriweather, sans-serif;
    font-weight: bold;
    margin: 0 10px;
}

nav a {
    text-decoration: none;
    color: var(--secondary-color); 
    transition: 0.3s ease-in-out; 
}

nav a:hover {
    text-decoration: underline;
}

header, section {
    margin: 2em auto;
    width min(75em, 100%);
    background-color: var(--base-color);
    padding: min(2em, 15%);
    border-radius: 1em; 
}

.profile__details{
   display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 3em; 
}

.profile__details img {
    border-radius: 10px;
    max-width: 100%;
    align-items: center;
    object-fit: cover;
    object-position: bottom;
    box-shadow: 10px 10px 50px gray; 
}

.text_container{
    flex: 0 1 34em;
}

h1{
    text-align: center;
    color: var(--secondary-color);
    font-size: 2.5rem; 
}

.text-container p {
    margin: .75em 0 1em 0;
    font-size: 1.25rem;
}
        
.designation{
    font-size: 0.8rem;
    text-align: center;
    color: gray;
} 
        
.social__icons{
   padding: 2rem 0;
   display: flex;
   align-items: center;
   justify-content: center;
   gap: 2rem; 
}
        
.youtube{
    color: red;
}

.youtube:hover{
    text-decoration: underline;
}

.tiktok{
    color: black;
}

.tiktok:hover{
    text-decoration: underline;
}
