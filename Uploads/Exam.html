<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
<title>Exam Upload</title>
<style>
:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}

.left a {
    padding: 0;
    position: fixed;
    top: 20px;
    width: 50px;
    height: 50px;
    background-color: var(--secondary-color);
    color: var(--base-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 24px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s ease-in-out;
}
.left a{
    left: 20px;
}
.left a:hover {
    transform: scale(1.1);
}

body {
    display: flex;
    padding: 1em;
    min-height: 100vh;
    flex-direction: column;
    justify-content: center
    align-items: center;
    font-family: Arial, sans-serif;
    background: var(--base-color);
    color: var(--text-color);
}

/* PAGE LOAD ANIMATION */
body {
  opacity: 0;
  transform: translateY(20px);
  animation: pageEnter 0.6s ease forwards;
}

@keyframes pageEnter {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Container */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
  gap: 40px;
}


.sidebar {
    height: 100%;
    width: 220px;
    position: fixed;
    top: 0;
    left: 0;
    background: #1f1f1f;
    padding: 20px;
}

#examList button {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    background: var(--secondary-color);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
}

#examList button:hover {
    background: #6c6cff;
}

/* Card */
.card {
  background: var(--base-color);
  padding: 40px;
  width: 300px;
  text-align: center;
  border-radius: 15px;

.card {
  opacity: 0;
  transform: scale(0.9);
  animation: cardPop 0.5s ease forwards;
  animation-delay: 0.3s;
}

@keyframes cardPop {
  to {
    opacity: 1;
    transform: scale(1);
  }
} 

  /* Glow effect */
  box-shadow: 0 0 20px var(--text-color);
}

.card h2 {
  margin-bottom: 10px;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input {
  padding: 10px;
  border: 1px solid var(--secondary-color);
  border-radius: 4px;
  font-size: 14px;
}
  
input[type="file"] {
  padding: 5px;
  border: 1px solid var(--secondary-color);
  border-radius: 6px;
  background-color: var(--color-1);
}

input[type="file"]::file-selector-button {
  background-color: var(--secondary-color); 
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 10px;
}

input[type="file"]::file-selector-button:hover {
  text-decoration: underline;
}
  
button { 
  background: var(--secondary-color);
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
} 
  
  button:hover { 
    text-decoration: underline;
  }

@media (max-width: 480px) {
  body{
   display: center;
  }

  .card {
    padding: 20px;
    border-radius: 12px;
  }

  .left a,
  .right a {
    background: transparent; 
    box-shadow: none;        
    color: var(--secondary-color);
    width: auto;
    height: auto;
    font-size: 28px;
  }

  .container {
    margin-top: 10px;
 } 
  input, button {
    font-size: 16px; /* better tap usability */
  }
}
</style>
</head>
<body>
<header>
<div class="left">
     <a href="../Activities.html">
        <i class="ri-arrow-left-line"></i>
     </a>
</div>

<div class="sidebar">
  <h3 style="color:white;">My Exams</h3>
  <div id="examList"></div>
</div>

<div class="container">
    <div class="card">
        <h2>Exam Upload</h2>
        <form id="exam-form">
        <label>Title:</label>
        <input type="text" id="title">

        <label>Upload File:</label>
        <input type="file" id="file">

        <label>Upload Image:</label>
        <input type="file" id="image">

        <button type="button" onclick="submitExam()">Submit</button>
        </form>
    </div>
</div>
</header>
<script>
function submitExam() {

    const title = document.getElementById("title").value.trim();
    const imageInput = document.getElementById("image").files[0];

    if (!title || !imageInput) {
        alert("Please complete all fields!");
        return;
    }

    const reader = new FileReader();

    reader.onload = function () {
        let exams = JSON.parse(localStorage.getItem("exams")) || [];

        exams.push({
            title: title,
            image: reader.result
        });

        localStorage.setItem("exams", JSON.stringify(exams));

        alert("Exam submitted!");
        document.getElementById("exam-form").reset();

        window.location.href="../Store/Exams.html";
    };

    reader.readAsDataURL(imageInput);
}

function loadSidebarExams() {
    let examList = document.getElementById("examList");
    let exam = JSON.parse(localStorage.getItem("exams")) || [];

        });

</script>
</body>
</html>
