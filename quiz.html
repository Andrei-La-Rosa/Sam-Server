<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <title>Quizzes</title>
    <style>

:root {
    --base-color: #ffffff;
    --text-color: black;
    --primary-color: #ffc06e;
    --secondary-color: #8D8DFF;
    --color-1: rgba(255, 255, 255, 0.952);
    --color-2: #cccccc;
    --color-3: #c9c5cc;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text-color);
}

body{
    display: center;
    padding: 1em;
    background-color: var(--secondary-color);
}

/* PAGE LOAD ANIMATION */
body {
  opacity: 0;
  transform: translateY(20px);
  animation: pageEnter 0.6s ease forwards;
}

@keyframes pageEnter {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.left{
    color: var(--secondary-color);
    font-size: 22px;
    font-weight: 600; 
}

.left a {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 50px;
    height: 50px;
    background-color: var(--secondary-color);
    color: var(--base-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;

    text-decoration: none;
    font-size: 24px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s ease-in-out;
}

/* Hover effect */
.left a:hover {
    transform: scale(1.1);
}

h1, h2, h3, {
    font-family: Merriweather, Tahoma, sans-serif;
}

h1{
    text-align: center;
    color: var(--secondary-color);
    font-size: 2.5rem; 
}

header, section {
    margin: 2em auto;
    width min(75em, 100%);
    background-color: var(--base-color);
    padding: min(2em, 15%);
    border-radius: 1em; 
}

.grid-container{
    display: grid;
    padding: 2rem;
    align-items: center;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem; 
}
.grid-container p{
    padding: 1rem;
    font-family: merriweather;
    color: var(--secondary-color);
    text-align: center;
}
.grid-container img{
    width: 100%;
    height: 100%;
    border-radius: .5em;
    transition: 100ms ease;
}

.grid-container img:hover{
    transform: translateY(20px)scale(1.02);
    scale: 1.05;
}


@media(max-width: 640px){
  header {
  text-align: center;
  }
  
  header.container{
  padding-top: 0;
 }

@media(max-width: 480px){
  .grid-container{
   display: flex;
   flex-flow: row;
  } 

  header{
  margin-top: 0;
  } 

  .h1{
  font-size: 1rem;
  }

    </style>
</head>
<body>
    <header>
    <div class="left">
            <a href="quizzes.html">
              <i class="ri-arrow-left-line"></i>
            </a>
    </div>
    <h1>My Quizzes</h1>
    <div class="grid-container">

    </div>
    </header>

<script>
function loadQuizzes() {
    let container = document.querySelector(".grid-container");

    let quizzes = JSON.parse(localStorage.getItem("quizzes")) || [];

    container.innerHTML = "";

    quizzes.forEach((quiz, index) => {
        let card = document.createElement("div");

        card.innerHTML = `
            <img src="${quiz.image}" alt="quiz image">
            <p>${quiz.title}</p>
        `;

        let btn = document.createElement("button");
        btn.textContent = "Delete";

        btn.addEventListener("click", () => {
            deleteQuiz(index);
        });

        card.appendChild(btn);
        container.appendChild(card);
    });
}

function deleteQuiz(index) {
    let quizzes = JSON.parse(localStorage.getItem("quizzes")) || [];

    quizzes.splice(index, 1);

    localStorage.setItem("quizzes", JSON.stringify(quizzes));

    loadQuizzes(); // refresh
}

loadQuizzes();
</script>
</body>
</html>
