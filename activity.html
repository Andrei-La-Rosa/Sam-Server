<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
<title>Lab Upload</title>
<style>
:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}
.left a,
.right a {
    position: fixed;
    top: 20px;
    width: 50px;
    height: 50px;
    background-color: var(--secondary-color);
    color: var(--base-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 24px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s ease-in-out;
}

.left a {
    left: 30px;
}

.right a {
    right: 30px;
}

.left a:hover,
.right a:hover {
    transform: scale(1.1);
}

body{
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--base-color);
  color: var(--text-color);
}

/* Container */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
  gap: 40px;
}

/* Card */
.card {
  background: var(--base-color);
  padding: 40px;
  width: 300px;
  text-align: center;
  border-radius: 15px;

  /* Glow effect */
  box-shadow: 0 0 20px var(--text-color);
}

.card h2 {
  margin-bottom: 10px;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input {
  padding: 10px;
  border: 1px solid var(--secondary-color);
  border-radius: 4px;
  font-size: 14px;
}
  
input[type="file"] {
  padding: 5px;
  border: 1px solid var(--secondary-color);
  border-radius: 6px;
  background-color: var(--color-1);
}

input[type="file"]::file-selector-button {
  background-color: var(--secondary-color); 
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 10px;
}

input[type="file"]::file-selector-button:hover {
  text-decoration: underline;
}
  
button { 
  background: var(--secondary-color);
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
} 
  
  button:hover { 
    text-decoration: underline;
  }

@media (max-width: 480px) {

  .card {
    padding: 20px;
    border-radius: 12px;
  }

  .left a,
  .right a {
    background: transparent; 
    box-shadow: none;        
    color: var(--secondary-color);
    width: auto;
    height: auto;
    font-size: 28px;
  }

  .container {
    margin-top: 10px;
  }

  input, button {
    font-size: 16px; /* better tap usability */
  }
}
</style>
</head>
<body>
<header>
<div class="left">
            <a href="activities.html">
              <i class="ri-arrow-left-line"></i>
            </a>
            </div>
<div class="right">
    <a href="labworks.html">
        <i class="ri-arrow-right-line"></i>
    </a>
</div>
<div class="container">
    <div class="card">
        <h2>Lab Upload</h2>
        <form id="lab-form">
        <label>Title:</label>
        <input type="text" id="title">

        <label>Upload File:</label>
        <input type="file" id="file">

        <label>Upload Image:</label>
        <input type="file" id="image">

        <button type="button" onclick="submitLab()">Submit</button>
        </form>
    </div>
</div>
</header>
<script>
document.getElementById("lab-form").addEventListener("submit", function(e){
    e.preventDefault();
});
function submitLab() {
    const title = document.getElementById("title").value.trim();
    const fileInput = document.getElementById("file").files[0];

    if (!title || !fileInput) {

            fileName: fileInput.name
        });

        localStorage.setItem("activity", JSON.stringify(activity));

        alert("Lab submitted!");
        document.getElementById("lab-form").reset();

</script>
</body>
</html>
