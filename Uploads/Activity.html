<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
<title>Lab Upload</title>
<style>
:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}
  
.left a {
    padding: 0;
    position: fixed;
    top: 20px;
    width: 50px;
    height: 50px;
    background-color: var(--secondary-color);
    color: var(--base-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 24px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s ease-in-out;
}
  
.left a{
    left: 30px;
}  
.left a:hover {
    transform: scale(1.1);
}

body{
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--base-color);
  color: var(--text-color);
}

/* PAGE LOAD ANIMATION */
body {
  opacity: 0;
  transform: translateY(20px);
  animation: pageEnter 0.6s ease forwards;
}

@keyframes pageEnter {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Container */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
  gap: 40px;
}

/* Card */
.card {
  background: var(--base-color);
  padding: 40px;
  width: 300px;
  text-align: center;
  border-radius: 15px;

.card {
  opacity: 0;
  transform: scale(0.9);
  animation: cardPop 0.5s ease forwards;
  animation-delay: 0.3s;
}
  
@keyframes cardPop {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

  /* Glow effect */
  box-shadow: 0 0 20px var(--text-color);
}

.card h2 {
  margin-bottom: 10px;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input {
  padding: 10px;
  border: 1px solid var(--secondary-color);
  border-radius: 4px;
  font-size: 14px;
}
  
input[type="file"] {
  padding: 5px;
  border: 1px solid var(--secondary-color);
  border-radius: 6px;
  background-color: var(--color-1);
}

input[type="file"]::file-selector-button {
  background-color: var(--secondary-color); 
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 10px;
}

input[type="file"]::file-selector-button:hover {
  text-decoration: underline;
}
  
.sidebar {
    height: 100%;       
    width: 250px;      
    position: fixed;   
    z-index: 1000;     
    top: 0;
    left: -500px;      
    background-color: var(--secondary-color); 
    color: #333;
    overflow-x: hidden; 
    padding: 80px 20px 20px; 
    transition: 0.5s ease; 
    box-shadow: 2px 0 10px var(--text-color); 
    border-radius: 20px;
}

.sidebar a {
    text-decoration: none;
    color: var(--secondary-color);
    display: block;         
    width: 185px;           
    max-width: 500px;
    min-height: 50px;
}

.sidebar.active {
    left: 0; 
}

.toggle-btn.active {
    left: 300px; 
}

button { 
  background: var(--secondary-color);
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
} 
  
  button:hover { 
    text-decoration: underline;
  }

@media (max-width: 480px) {

  .card {
    padding: 20px;
    border-radius: 12px;
  }

  .left a {
    background: transparent; 
    box-shadow: none;        
    color: var(--secondary-color);
    width: auto;
    height: auto;
    font-size: 28px;
  }

  .container {
    margin-top: 10px;
  }

  input, button {
    font-size: 16px; /* better tap usability */
  }
}
</style>
</head>
<body>
<header>
<div class="left">
            <a href="../Activities.html">
              <i class="ri-arrow-left-line"></i>
            </a>
</div>

<div class="sidebar">
  <div class="icon"><i class="ri-notification-3-line"></i></div>
  <button>Lab Activity 1</button>
  <button>Lab Activity 2</button>
  <button>Lab Activity 3</button>
</div>

<div class="container">
    <div class="card">
        <h2>Lab Upload</h2>
        <form id="lab-form">
        <label>Title:</label>
        <input type="text" id="title">

        <label>Upload File:</label>
        <input type="file" id="file">

        <label>Upload Image:</label>
        <input type="file" id="image">

        <button type="button" onclick="submitLab()">Submit</button>
        </form>
    </div>
</div>
</header>
<script>
document.getElementById("lab-form").addEventListener("submit", function(e){
    e.preventDefault();
});
function submitLab() {
    const title = document.getElementById("title").value.trim();
    const fileInput = document.getElementById("file").files[0];

    if (!title || !fileInput) {
        alert("Please complete all fields!");
        return;
    }

    const reader = new FileReader();

    reader.readAsDataURL(FileInput);
        let activity = JSON.parse(localStorage.getItem("activity")) || [];

        activity.push({
            title: title,
            file: reader.result,   // 🔥 store FILE here
            fileName: fileInput.name
        });

        localStorage.setItem("activity", JSON.stringify(activity));

        alert("Lab submitted!");
        document.getElementById("lab-form").reset();

        window.location.href="../Store/Labworks.html";
    };

  function setupSidepanel() {
    const toggleBtn = document.getElementById('sidebarToggleBtn');
    const sidebar = document.getElementById('mySidebar');
    
    if (!toggleBtn || !sidebar) return;

    toggleBtn.addEventListener('click', function() {
        sidebar.classList.toggle('active');
        this.classList.toggle('active');
    });
}
  
setupSidepanel();
</script>
</body>
</html>
