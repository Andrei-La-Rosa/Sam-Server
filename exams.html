<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
    <title>Exams</title>
    <style>
:root {
    --base-color: #ffffff;
    --text-color: black;
    --primary-color: #ffc06e;
    --secondary-color: #8D8DFF;
    --color-1: rgba(255, 255, 255, 0.952);
    --color-2: #cccccc;
    --color-3: #c9c5cc;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
    color: var(--text-color);
}

body{
    display: center;
    padding: 1em;
    background-color: var(--secondary-color);
}
.left{
    color: var(--secondary-color);
    font-size: 22px;
    font-weight: 600; 
}

.left a {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 50px;
    height: 50px;
    background-color: var(--secondary-color);
    color: var(--base-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;

    text-decoration: none;
    font-size: 24px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s ease-in-out;
}

/* Hover effect */
.left a:hover {
    transform: scale(1.1);
}

h1, h2, h3, {
    font-family: Merriweather, Tahoma, sans-serif;
}

h1{
    text-align: center;
    color: var(--secondary-color);
    font-size: 2.5rem; 
}

header, section{
    margin: 2em auto;
    width: min(75em, 100%);
    background-color: var(--base-color);
    padding: min(2em, 15%);
    border-radius: 1em; 
}

.grid-container{
    display: grid;
    padding: 2rem;
    align-items: center;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem; 
}
.grid-container p{
    padding: 1rem;
    font-family: merriweather;
    color: var(--secondary-color);
    text-align: center;
}
.grid-container img{
    width: 100%;
    height: 100%;
    border-radius: .5em;
    transition: 100ms ease;
}

.grid-container img{
    width: 20vw;
    height: 20vw;
   
}

.grid-container img:hover{
    transform: translateY(20px)scale(1.02);
    scale: 1.05;
}

a{
    font-family: sans-serif
    color: var(--secondary-color)
}

a:hover{
    text-decoration: underline;
}
    </style>
</head>
<body>
    <header>
    <div class="left">
            <a href="exam.html">
              <i class="ri-arrow-left-line"></i>
            </a>
    </div>
    <h1>My Exams</h1>
    <div class="grid-container">

    </header>
<script>
function loadExams() {
    let container = document.querySelector(".grid-container");

    let exams = JSON.parse(localStorage.getItem("exams")) || [];

    container.innerHTML = "";

    exams.forEach((exams, index) => {
        let card = document.createElement("div");

        card.innerHTML = `
            <img src="${exams.image}" alt="exam image">
            <p>${exams.title}</p>
        `;
    let btn = document.createElement("button");
    btn.textContent = "Delete";

    // 🔥 delete function
    btn.addEventListener("click", () => {
      deleteExams(index);

    });
  card.appendChild(btn);
  container.appendChild(card);
}
function deleteExams(index) {
    let exams = JSON.parse(localStorage.getItem("exams")) || [];

    exams.splice(index, 1);

    localStorage.setItem("exams", JSON.stringify(exams));

    loadExams(); // refresh
}
loadExams();
</script>
</body>
</html>
