<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap');

:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}

*{
 margin: 0;
 padding: 0;
 box-sizing: border-box;
}

html{
    font-family: Merriweather, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
    color: var(--text-color);
}

body{
    padding: 1em;
    background-color: var(--base-color);
}

h1, h2, h3, {
    font-family: Merriweather, 'Segoe UI', Tahoma;
}

nav{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0;
    height: 70px;
}

nav .left a{
    color: var(--secondary-color);
    font-size: 22px;
    font-weight: 600;
}

@media (max-width: 480px){
    nav{
        padding 0 20px;
    }
} 
nav .right a{
    color: var(--secondary-color); 
    font-family: Merriweather, sans-serif;
    font-weight: bold;
    margin: 0 10px;
    size
}

nav a {
    text-decoration: none;
    color: var(--secondary-color); 
    transition: 0.3s ease-in-out; 
}

nav a:hover {
    text-decoration: underline;
 }

header, section {
    margin: 2em auto;
    width min(75em, 100%);
    background-color: var(--base-color);
    padding: 1.5em;
    border-radius: 1em; 
}

.profile-details{
   display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 3em; 
}

.profile-details img {
    border-radius: 10px;
    max-width: 100%;
    align-items: center;
    object-fit: cover;
    object-position: bottom;
    box-shadow: 10px 10px 50px gray; 
}
/* FIXED class name */
.text-container{
    flex: 0 1 34em;
}

h1{
    text-align: center;
    color: var(--secondary-color);
    font-size: 2.2rem; 
}

.text-container p {
    margin: .5em 0;
    font-size: 1.1rem;
}

.designation{
    font-size: 0.8rem;
    text-align: center;
    color: gray;
} 

/* SOCIAL ICONS */
.social-icons{
   padding: 1rem 0;
   display: flex;
   justify-content: center;
   gap: 2rem; 
}

/* ICON STYLE */
.social-icons a i {
    font-size: 28px;
    transition: transform 0.3s ease, filter 0.3s ease;
}

/* GENERAL HOVER */
.social-icons a:hover i {
    transform: scale(1.3) rotate(8deg);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
}

/* YOUTUBE ANIMATION */
.ri-youtube-fill:hover {
    animation: pulseYT 0.6s ease;
}

@keyframes pulseYT {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1.2); }
}

/* TIKTOK ANIMATION */
.ri-tiktok-line:hover {
    animation: bounceTT 0.6s ease;
}

@keyframes bounceTT {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }

@media(max-width: 640px){
  header {
  text-align: center;
  }
  
  header text-container{
  padding-top: 0;
 }

@media(max-width: 480px){
  nav{
  display: none;
  } 

  .left, 
  .right{
  display: block
  } 

  header{
  margin-top: 0;
  } 
}


</style>
</head>

<body>

<header>

            <a href="activity.html">Activity</a>
            <a href="exam.html">Exams</a>
        </div>
    </nav>

    <div class="profile-details">
        <img src="dre.jpg" alt="My Picture" width="400px" height="500px">       
         
        <div class="text-container">
            <h1>Andrei Samuel C. La Rosa</h1>
            <p class="designation">Student no: 251100672</p>

            <p>
                <b>I'm a student of Computer Science [BSCS-1B] in CVSU-Silang</b><br>
                I enjoy making content such as <strong>Drawing, Editing, and Gaming</strong>
            </p>

            <div class="social-icons">
                <a href="https://www.youtube.com/channel/UCZ1qf-GyxfY_5ZR7TsMjRZA">
                    <i class="ri-youtube-fill"></i>
                </a>

                <a href="https://www.tiktok.com/@nyreitv?is_from_webapp=1&sender_device=pc">
                    <i class="ri-tiktok-line"></i>
                </a>
            </div>
        </div>
    </div>

</header>
