    text-align: center;
    border-radius: 5px;
    background-color: var(--extra-light);

}
        
.profile__card img{

    boarder-radius: 100%;
    padding: 1rem 0;
}

.more{
    position: absolute;
    top: 1rem;
    right: 1rem;
    font-size: 2rem;
    color: var(--text-light); 
    cursor: pointer;
}

.name{
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text-dark);
}

.about{
    font-size: 0.8rem;
    color: var(--text-light);
}

.social__icons{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
}
