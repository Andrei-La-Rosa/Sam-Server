<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
<title>Lab Upload</title>
<style>
:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}
  
.left a {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 50px;
    height: 50px;
    background-color: var(--secondary-color);
    color: var(--base-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;

    text-decoration: none;
    font-size: 24px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s ease-in-out;
    z-index: 1000;
}

/* Hover effect */
.left a:hover {
    transform: scale(1.1);
}

body {
    background-image: url("../HE4NHATWAAA3kvj.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    margin: 0;
    padding: 1em;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: var(--text-color);
}

/* PAGE LOAD ANIMATION */
body {
  opacity: 0;
  transform: translateY(20px);
  animation: pageEnter 0.6s ease forwards;
}

@keyframes pageEnter {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h3{
  text-alignment: center;
} 
/* Container */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
  gap: 40px;
}

/* Card */
.card {
  background: var(--base-color);
  padding: 40px;
  width: 300px;
  text-align: center;
  border-radius: 15px;
  box-shadow: 0 0 20px var(--text-color);

  opacity: 0;
  transform: scale(0.9);
  animation: cardPop 0.5s ease forwards;
  animation-delay: 0.3s;
}
  
@keyframes cardPop {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.card h2 {
  margin-bottom: 10px;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input {
  padding: 10px;
  border: 1px solid var(--secondary-color);
  border-radius: 4px;
  font-size: 14px;
}
  
input[type="file"] {
  padding: 5px;
  border: 1px solid var(--secondary-color);
  border-radius: 6px;
  background-color: var(--color-1);
}

input[type="file"]::file-selector-button {
  background-color: var(--secondary-color); 
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 10px;
}

input[type="file"]::file-selector-button:hover {
  text-decoration: underline;
}
  
.sidebar {
    position: fixed;
    top: 0;
    left: -200px;

    width: 200px;
    height: 100vh; /* ensures full screen height */

    background: #1f1f1f;

    transition: 0.3s ease;
    z-index: 2000;

    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 15px;
}

.sidebar.active {
    left: 0;
}

.menu-btn {
    position: absolute;
    top: 50%;
    right: -20px;
    transform: translateY(-50%);

    background: var(--text-color);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;

    z-index: 3000;
}

#labList {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#labList button {
  background: var(--secondary-color);
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#labList button:hover {
    background: #6c6cff;
}

#labList a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 8px;
    border-radius: 6px;
}

#labList a:hover {
    background: #6c6cff;
}

button { 
  background: var(--secondary-color);
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
} 
  
button:hover { 
    text-decoration: underline;
}

@media (max-width: 480px) {
 .card {
    padding: 20px;
    border-radius: 12px;
  }

  .left a {
    background: transparent; 
    box-shadow: none;        
    color: var(--secondary-color);
    width: auto;
    height: auto;
    font-size: 28px;
  }

  .container {
    margin-top: 10px;
  }

  input, button {
    font-size: 16px;
  }

  #labList button {
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 6px;
  }

  .sidebar {
      width: 180px;
  }
}
</style>
</head>
<body>
<header>

<div class="left">
 <a href="../Activities.html"> <i class="ri-arrow-left-line"></i> </a>
</div>

<div class="sidebar">
  <button class="menu-btn" onclick="toggleSidebar()">
    <i class="ri-arrow-right-line"></i>
  </button>

  <h3 style="color:white;">My Activities</h3>
  <div id="labList">
     <button><a href="../Labworks/Lab01.html">Lab #1</a></button>
     <button><a href="../Labworks/Lab02.html">Lab #2</a></button>
     <button><a href="../Labworks/Lab03.html">Lab #3</a></button>
  </div>
</div>

<div class="container">
    <div class="card">
        <h2>Lab Upload</h2>
        <form id="lab-form">
        <label>Title:</label>
        <input type="text" id="title">

        <label>Upload File:</label>
        <input type="file" id="file">

        <label>Upload Image:</label>
        <input type="file" id="image">

        <button type="button" onclick="submitLab()">Submit</button>
        </form>
    </div>
</div>
</header>
<script>
document.getElementById("lab-form").addEventListener("submit", function(e){
    e.preventDefault();
});

function submitLab() {

    const title = document.getElementById("title").value.trim();
    const fileInput = document.getElementById("file").files[0];

    if (!title || !fileInput) {
        alert("Please complete all fields!");
        return;
    }

    const reader = new FileReader();

    reader.onload = function () {

        let activity = JSON.parse(localStorage.getItem("activity")) || [];

        activity.push({
            title: title,
            file: reader.result,
            fileName: fileInput.name
        });

        localStorage.setItem("activity", JSON.stringify(activity));

        alert("Lab submitted!");
        document.getElementById("lab-form").reset();

        window.location.href = "../Store/Labworks.html";
    };

    reader.readAsDataURL(fileInput);
}

function toggleSidebar() {
    document.querySelector(".sidebar").classList.toggle("active");

    const icon = document.querySelector(".menu-btn i");

    icon.classList.toggle("ri-arrow-right-line");
    icon.classList.toggle("ri-arrow-left-line");
}

function loadSidebarActivity() {
    let labList = document.getElementById("labList");
    
    let defaultLabs = `
        <button><a href="../Labworks/Lab01.html">Lab #1</a></button>
        <button><a href="../Labworks/Lab02.html">Lab #2</a></button>
        <button><a href="../Labworks/Lab03.html">Lab #3</a></button>
    `;

    labList.innerHTML = defaultLabs;

    let activity = JSON.parse(localStorage.getItem("activity")) || [];

    activity.forEach((activity, index) => {
        let btn = document.createElement("button");
        btn.textContent = activity.title;

        btn.addEventListener("click", () => {
            localStorage.setItem("selectedActivity", index);
            window.location.href = "../Store/Labworks.html";
        });

        labList.appendChild(btn);
    });
}

loadSidebarActivity();
</script>
</body>
</html>
