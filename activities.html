<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activities</title>
<style>
:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}
    
*{
 margin: 0;
 padding: 0;
 box-sizing: border-box;
}
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--base-color);
    color: white;
}

.left{
    display: flex;
    justify-content: space-between;
    padding: 0;
    height: 80px;
}

.left a{
    color: var(--secondary-color);
    font-size: 22px;
    font-weight: 600;
}

.left a:hover{
    text-decoration: underline;
}
/* CENTER CONTENT */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 50px;
    gap: 40px;
}

/* CARD STYLE */
.card {
    width: 300px;
    padding: 30px;
    text-align: center;
    border: 2px solid var(--secondary-color);
    border-radius: 15px;
    background: var(--base-color);
    box-shadow: 0 0 20px;
    transition: 0.3s;
}

.card:hover {
    background-color: var(--secondary-color);
    color: var(--base-color);
    transform: scale(1.05);
}

/* TEXT */
.card h2 {
    margin-bottom: 10px;
}

.card p {
    font-size: 20px;
}

</style>    
</head>
<body>

<!-- NAVBAR -->
<div class="left">
    <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="card">
        <h2>Quiz</h2>
        <p id="quizCount">0</p>
    </div>

    <div class="card">
        <h2>Lab Activity</h2>
        <p id="labCount">0</p>
    </div>

    <div class="card">
        <h2>Major Exam</h2>
        <p id="examCount">0</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
