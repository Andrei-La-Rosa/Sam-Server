<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <title>Simple carousel · example</title>
    <style>
        /* just the basics — no extra decorations */
        :root {
            --base-color: white;
            --text-color: black;
            --primary-color: yellow;
            --secondary-color: #8D8DFF;
            --color-1: gray;
            --color-2: white;
            --color-3: white;
        }
    

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url("Haru.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.5rem 2.5rem 1.5rem;
            box-shadow: 0 15px 30px #b9a6dd;
            text-align: center;
        }

        h2 {
            color: #2c2152;
            margin-bottom: 1.8rem;
            font-weight: 500;
            font-size: 2rem;
        }

        /* ---------- SIMPLE CAROUSEL ---------- */
        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            scroll-snap-type: x mandatory;
            padding: 0.5rem 0.2rem 1.5rem 0.2rem;
            /* hide scrollbar if you want cleaner look (optional) */
            scrollbar-width: thin;
            scrollbar-color: #a58bd4 #e5d9ff;
        }

        /* for Chrome/Safari */
        .carousel::-webkit-scrollbar {
            height: 8px;
        }
        .carousel::-webkit-scrollbar-track {
            background: #e5d9ff;
            border-radius: 20px;
        }
        .carousel::-webkit-scrollbar-thumb {
            background: #a58bd4;
            border-radius: 20px;
        }

        .carousel-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            width: 220px;
            height: 150px;
            background: #7a62b5;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 12px #9d87cf;
            border: 3px solid white;
        }

        /* make images fit (if you use real images) */
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.4rem;
        }

        .note {
            margin-top: 1.8rem;
            color: #4a3977;
            background: #eee5ff;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            font-size: 1rem;
        }

    .nav {
            margin-top: 1.5rem;
            color: #4a3977;
            background: #eee5ff;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            font-size: 1rem;
            justify-content: center;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
    .left{
        color: var(--secondary-color);
        font-size: 22px;
        font-weight: 600;
    }
    
    .left a {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 50px;
        height: 50px;
        background-color: var(--secondary-color);
        color: var(--base-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    
        text-decoration: none;
        font-size: 24px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: 0.3s ease-in-out;
    }

/* Hover effect */
    .left a:hover {
    transform: scale(1.1);
    }

         button {
            margin-top: 1.5px;
            color: #4a3977;
            background: #eee5ff;
            padding: 0.8px 20px;
            border-radius: 3rem;
            font-size: 15px;
            display: flex;
            gap: 0.1px;
            background-color: rgb(177, 177, 177);
            text-decoration: none;
            
        }

        button:hover {
            background-color: white;
        }

        button a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>
    <div class="left">
    <a href="../Uploads/Labworks.html">
        <i class="ri-arrow-left-line"></i>
    </a>
    </div>

    <div class="card">
        <h2>🖼️ simple carousel</h2>

        <!-- === CAROUSEL (only HTML + CSS) === -->
        <div class="carousel">
            <!-- slide 1 (using colored divs with emoji – you can replace with <img> ) -->
            <div class="carousel-item" id="item-1"><img src="banana.jpg" alt="Banana"></div>
            <div class="carousel-item" id="item-2"><img src="Doge.webp" alt="Dog"></div>
            <div class="carousel-item" id="item-3"><img src="apple.jpg" alt="Apple"></div>
            <div class="carousel-item" id="item-4"><img src="knight.jpg" alt="Knight" ></div>
            <div class="carousel-item" id="item-5"><img src="dragon.png" alt="Dragon"></div>
            <div class="carousel-item" id="item-6"><img src="basic.webp" alt="Cat"></div>
        </div>

        <div class="nav">
            <button><a href="#item-1">Slide 1</a></button>
            <button><a href="#item-2">Slide 2</a></button>
            <button><a href="#item-3">Slide 3</a></button>
            <button><a href="#item-4">Slide 4</a></button>
            <button><a href="#item-5">Slide 5</a></button>
            <button><a href="#item-6">Slide 6</a></button>
        </div>

        <!-- short explanation -->
        <p style="margin-top: 1.5rem; color:#3c2d66; background:#f3ecff; padding:0.6rem; border-radius:3rem;">
            ✔️ <code>display: flex</code> + <code>overflow-x: auto</code> + <code>scroll-snap-type</code>
        </p>
    </div>
</body>
</html>
