<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" 
    rel="stylesheet"/>
<title>Activities</title>
<style>
:root {
--base-color: white;
--text-color: black;
--primary-color: yellow;
--secondary-color: #8D8DFF;
--color-1: gray;
--color-2: white;
--color-3: white;
}
    
*{
 margin: 0;
 padding: 0;
 box-sizing: border-box;
}
    
body {
    padding: 1em;
    font-family: Arial, sans-serif;
    background: var(--base-color);
    color: var(--text-color);
}

.left{
    color: var(--secondary-color);
    font-size: 22px;
    font-weight: 600px;
}
    
.left a{
    display: flex;
    color: var(--secondary-color);
    transition: 0.3s ease-in-out;
    height: 80px; 
    margin: 5rem;
}

.left a:hover{
    text-decoration: underline;
}
    
/* CENTER CONTENT */
h1{
    text-align: center;
    color: var(--secondary-color);
    font-size: 2.5rem; 
}
    
.container {
    margin: 5rem;
    display: grid;
    padding: 2rem;
    align-items: center;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 2rem;
}

/* CARD STYLE */
.card {
    padding: 3rem 2rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 1rem;
    border: 2px solid var(--secondary-color);
    border-radius: 3rem;
    cursor: pointer;
    transition: 0.3s ease-in-out;  
}

.card:hover {
    background-color: var(--secondary-color);
    color: var(--base-color);
    transform: scale(1.05);
}

/* TEXT */
.card h2 {
    margin-bottom: 10px;
}

.card p {
    font-size: 20px;
}

</style>    
</head>
<body>
<header>
<!-- NAVBAR -->
<div class="left">
    <a href="index.html"><strong><-</strong></a>
</div>

<!-- CONTENT -->
    <h1>Activities</h1>
<div class="container">
    
    <div class="card">
        <a href=quizzes.html>
        <h2>Quizzes</h2> 
        <p id="quizCount">0</p>  
        </a>
    </div>

    <div class="card">
         <a href="Activity.html>
         <h2>Lab Work</h2>
         <p id="labCount">0</p>
         </a>
    </div>

    <div class="card">
        <a href="exams.html">
        <h2>Exams</h2>
        <p id="examCount">0</p>    
        </a> 
    </div>

</div>
</header>
<script src="script.js"></script>
</body>
</html>
